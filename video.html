---
layout: default
title: Paper Video
---

<section class="video-shell">
  <h2 id="paper-title">Paper title</h2>
  <p class="muted" id="paper-subtitle">Video &amp; PDF</p>
  <div class="video-frame-wrap">
    <iframe id="video-frame" src=""
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen title="Paper video"></iframe>
  </div>
</section>

<section class="links">
  <h2>Links</h2>
  <p id="pdf-link-row">
    <a id="pdf-link" href="#" target="_blank" rel="noopener">PDF</a>
  </p>
</section>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var title = params.get("title") || "Paper video";
  var video = params.get("video") || "";
  var pdf   = params.get("pdf")   || "";
  var authors = params.get("authors") || "";
  document.getElementById("paper-title").textContent = title;
  document.getElementById("paper-subtitle").textContent = authors;
  var frame = document.getElementById("video-frame");
  if (video) { frame.src = video; } else { frame.replaceWith("No video URL provided."); }
  var pdfLink = document.getElementById("pdf-link");
  var pdfRow = document.getElementById("pdf-link-row");
  if (pdf) { pdfLink.href = pdf; } else { pdfRow.textContent = "No PDF link provided."; }
  document.title = title + " · Chahat Kalsi";
})();
</script>
