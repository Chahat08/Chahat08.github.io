---
layout: default
---

<article>
  <h2>{{ page.title }}</h2>
  <p class="muted post-date">{{ page.date | date: "%B %d, %Y" }}</p>
  <hr>
  <div class="post-content">
    {{ content }}
  </div>
  <hr>
  <p class="muted"><a href="{{ '/blog/' | relative_url }}">← Back to all posts</a></p>
</article>
